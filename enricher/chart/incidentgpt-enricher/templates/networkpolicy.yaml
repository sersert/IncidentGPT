apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "incidentgpt-enricher.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "incidentgpt-enricher.fullname" . }}
    app.kubernetes.io/component: enricher
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "incidentgpt-enricher.fullname" . }}
      app.kubernetes.io/component: enricher
  policyTypes:
    - Ingress
  ingress:
    # Alertmanager webhook из monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9099
          protocol: TCP
