apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-worker.fullname" . }}-secrets
  labels:
    {{- include "ai-worker.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENROUTER_API_KEY: {{ .Values.secretValues.openrouterApiKey | default "" | quote }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secretValues.telegramBotToken | default "" | quote }}
